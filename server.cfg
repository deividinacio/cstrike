//>>> Deivid <<< Server Addons 


//#################################### INICIO CONF ADDON ####################################

//Plugin Anti-ping 
hpk_max = 160 
hpk_time = 5  
hpk_test = 3  

//Plugin AMX Gore
//É um plugin pesado de acordo com o server
//Por padrăo o nível de sangue é médio
//isso irá evitar o lag no servidor.
//Caso queira alterar , remova "//" dos
//comandos do plugin no Nível escolhido

//Nível: baixo

//amx_gore "a"
//amx_gore_exphp 160

//Nível: médio (Ativado:Padrăo)

amx_gore "abd"
amx_gore_exphp 140

//Nível: Alto

//amx_gore "abcdefg"
//amx_gore_exphp 120

//Bunny hop 
bh_enabled 1
bh_autojump 1
bh_showusage 1

//C4 Bonus em $
amx_plant_bonus 150

//Linguagem PT-BR automática
setinfo "lang" "bp"

//Plugin-Shot (Brasileiro)
pxl_shot 1

//Money maior que 16000
amx_maxmoney 9999999

//Agilizar a troca de mapas
hpk_maxsize 0.0

//#################################### FIM CONF ADDON ####################################


//Pause
pausable 0

//Cheats
sv_aim 0 
sv_cheats 0 

//Server
sv_region 255
sv_maxspeed 400
sv_gravity 800
sv_allowupload 1
sv_allowdownload 1
sv_contact "contato@deividserver"
sv_downloadurl ""
sv_voicecodec "voice_speex"
sv_voicequality 3
sv_voiceenable 1
sv_timeout "999"
sv_alltalk 0       // todos te ouvem no microfone, se deixar 0 somente seu time vai lhe ouvir
sv_unlag 1
sv_maxunlag 0.1
sv_unlagsamples 1
sv_proxies 0
sv_cheats 0
sv_accelerate 0


//Maps
mp_c4timer 45
mp_fadetoblack 0
mp_flashlight 1
mp_footsteps 1
mp_freezetime 2
mp_friendlyfire 0
mp_kickpercent 0.60
mp_startmoney 800
mp_mapvoteratio 0.60
mp_timelimit 16
mp_consistency 1
mp_roundtime 4.0


//Sangue 
violence_ablood 0
violence_agibs 0
violence_hblood 0
violence_hgibs 0

//Rates
sv_minrate 0
sv_maxrate 16000
sv_maxupdaterate 26
sv_minupdaterate 26
sv_zmax 50000 // deixa a visăo do mapa completo.
sv_filetransfercompression 0
sys_ticrate 1000.0
fps_max 100.0

//Carregar CFG

exec listip.cfg
exec banned.cfg
//exec cfg/booster.cfg
