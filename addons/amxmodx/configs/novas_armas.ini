; #######################  ATENÇÃO  #######################


; 1- Os sons das armas ou bombas geralmente são configurados para fazer a leitura na pasta "weapons"
; Porém você pode verificar qual caminho do som (caso tenha sons personalizados) decompilando o arquivo ".mdl"

; 2- Note que na troca do arquivo original pela skin nova, eu coloquei o mesmo nome do original e do novo para substituição
; Exemplo: "v_hegrenade.mdl" na pasta original continuou sendo "v_hegrenade.mdl" na pasta de novas skins.
; Caso você for trocar a skin pela segunda vez, provavelmente o servidor vai ler a skin antiga, se isso acontecer, mude o nome da sua nova skin
; por exemplo pode colocar um "_mod" no fim dela, assim :

; v_smokegrenade_mod.mdl 

; DEPOIS DE MUDAR O NOME DELA, FAÇA A ALTERAÇÃO AQUI NA LINHA DE CÓDIGO, SALVE E 

; REINICIE O SERVIDOR PARA VER SE APLICOU.  




