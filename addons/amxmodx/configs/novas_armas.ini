; NÃO ESQUEÇA DE TIRAR O ";" (ponto e virgula) da frente para que os models se apliquem
; Siga os exemplo abaixo:

; Exemplo1: "models/v_awp.mdl" "models/SuaPasta/v_awp.mdl" // Subistitue para todos no server.


; O Mesmo pode ser feito com sons, Siga um Exemplo:
; "sound/weapons/sound.wav" "sound/weapons/newsound.wav" "CT"

; Você Pode Modificar os Models Abaixo Com Diretorio das Armas que você quer Desativar
; "models/v_glock18.mdl"  = é o nome da pasta que esta a skin e o nome da skin original do jogo
; "models/newSkins_Deivid/glock18/v_glock18.mdl  =  "admodels" é o nome da pasta original do jogo, "newSkins_Deivid" o nome da sua pasta
; que vc criou dentro de "admodel" e "glock18" é o nome da pasta que esta sua skin, por fim "v_glock18.mdl" é o nome da skin


; Nota: dentro da pasta de skin vc vai econtra v_nomeSkin.mdl, w_nomeSkin.mdl  e p_nomeSkin.mdl.
; Cada arquivo desse representa a posição da arma, por exemplo: 

; v_nomeSkin.mdl = o braço segurando a arma
; w_nomeSkin.mdl = é quando a arma está jogada no chão
; p_nomeSkin.mdl = é quando a arma esta apontada pra vc, qnd esta de frente para o oponente.

; PORÉM COLOCAR TODAS AS MODELS VAI DEIXAR SEU SERVER LENTO PARA FAZER DOWNLOAD NO MAQUINA DOS AMIGOS 

; ATENÇÃO O NÍVEL MÁXIMO DE PASTA PARA CHEGAR ATÉ O ARQUIVO ".mdl" É 3 (contando com a Models)
; CASO VC COLOQUE MAIS DE 3 NÍVEIS A KINS NÃO VAI FUNCIONAR 

; EXEMPLO ERRADO!

;"models/v_glock18.mdl" "models/newSkins_Deivid/pistola/glock18/v_glock18.mdl"
;"models/w_glock18.mdl" "models/newSkins_Deivid/pistola/glock18/w_glock18.mdl"

;Perceba que no exemplo a cima tive que percorrer 4 níveis de pasta: models, newSkins_Deivid, pistola e glock18 até chegar no arquivo ".mdl"
;Isso da bug e não acontece a troca da skin

;EXEMPLO CORRETO!

;"models/v_glock18.mdl" "models/newSkins_Deivid/glock18/v_glock18.mdl"
;"models/w_glock18.mdl" "models/newSkins_Deivid/glock18/w_glock18.mdl"


